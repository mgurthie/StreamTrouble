<rect x="450" y="105" width="300" height="68" rx="12" fill="#fff2cc" stroke="#555555" stroke-width="1.7"/><text x="600.0" y="144.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#17202a"><tspan x="600.0" y="135.0">Can you reproduce the buffering on</tspan><tspan x="600.0" y="153.0">the Station Website?</tspan></text>
<rect x="450" y="240" width="300" height="68" rx="12" fill="#fff2cc" stroke="#555555" stroke-width="1.7"/><text x="600.0" y="279.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#17202a"><tspan x="600.0" y="270.0">Does the Mobile App or an OTT</tspan><tspan x="600.0" y="288.0">device show the same buffering?</tspan></text>
<rect x="450" y="375" width="300" height="68" rx="12" fill="#fff2cc" stroke="#555555" stroke-width="1.7"/><text x="600.0" y="414.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#17202a"><tspan x="600.0" y="396.0">Does Quickplay show the channel</tspan><tspan x="600.0" y="414.0">Healthy with the manifest updating</tspan><tspan x="600.0" y="432.0">normally?</tspan></text>
<rect x="450" y="510" width="300" height="68" rx="12" fill="#fff2cc" stroke="#555555" stroke-width="1.7"/><text x="600.0" y="549.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#17202a"><tspan x="600.0" y="531.0">Are multiple platforms buffering</tspan><tspan x="600.0" y="549.0">at the same time on different</tspan><tspan x="600.0" y="567.0">networks?</tspan></text>
